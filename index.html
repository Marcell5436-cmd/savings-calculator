<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savings Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      padding: 32px;
      background: #e5e7eb;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 3rem;
      padding: 10px 0;
    }

    .time-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    .time-buttons button {
      padding: 12px 24px;
      border: none;
      background-color: #F0F0F0;
      color: #111827;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 0 #ffffff, inset -1px -1px 0 0 #808080;
    }

    .time-buttons button:hover {
      background-color: #e0e0e0;
    }

    .time-buttons button:active {
      box-shadow: inset 0 -1px 0 0 #ffffff, inset 1px 1px 0 0 #808080;
    }

    .content {
      display: flex;
      justify-content: space-between;
      gap: 50px;
      flex-wrap: wrap;
    }

    .left-side {
      flex: 1;
      min-width: 300px;
    }

    .left-side label {
      display: block;
      margin-bottom: 10px;
      margin-top: 20px;
      font-size: 1.1rem;
    }

    .left-side input {
      width: 100%;
      padding: 12px;
      border: none;
      margin-bottom: 10px;
      font-size: 1rem;
      background-color: #f0f1f3;
      border-radius: 6px;
      box-shadow: inset 1px 1px 0 0 #ffffff, inset -1px -1px 0 0 #808080;
    }

    .calculate-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      background-color: #F0F0F0;
      color: #111827;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 0 #ffffff, inset -1px -1px 0 0 #808080;
    }

    .calculate-btn:hover {
      background-color: #e0e0e0;
    }

    .calculate-btn:active {
      box-shadow: inset 0 -1px 0 0 #ffffff, inset 1px 1px 0 0 #808080;
    }

    .right-side {
      flex: 1;
      min-width: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .result-box {
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
    }

    @media (max-width: 768px) {
      .content {
        flex-direction: column;
      }

      h1 {
        font-size: 2rem;
      }

      .result-box {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Savings Calculator</h1>

    <div class="time-buttons">
      <button>Yearly</button>
      <button>Monthly</button>
      <button>Weekly</button>
    </div>

    <div class="content">

      <div class="left-side">

        <label for="income">Income(Per Month)</label>
        <input type="number" id="income" placeholder="Enter income">

        <label for="bills">Household Bills(Per Month)</label>
        <input type="number" id="bills" placeholder="Enter household bills">

        <label for="payments">Monthly Payments(Per Month)</label>
        <input type="number" id="payments" placeholder="Enter monthly payments">

        <button class="calculate-btn" onclick="calculateSavings()">
          Calculate
        </button>

      </div>

      <div class="right-side">
        <div class="result-box" id="result">
          Result: 0 Ft
        </div>
      </div>

    </div>

  </div>

  <script>
    function calculateSavings() {

      let income = Number(document.getElementById("income").value);

      let bills = Number(document.getElementById("bills").value);

      let payments = Number(document.getElementById("payments").value);

      let result = income - bills - payments;

      document.getElementById("result").innerText =
        "Result: " + result + " Ft";
    }
  </script>

</body>
</html>
